apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tenant-apps
  namespace: flux-system
spec:
  interval: 1m
  prune: true
  serviceAccountName: cluster-admin
  path: ../../../shared/manifests
  sourceRef:
    kind: GitRepository
    name: app-repo
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
      - kind: Secret
        name: tenant-secrets
