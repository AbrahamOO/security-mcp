apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postrender-app
  namespace: argocd
spec:
  source:
    repoURL: https://github.com/org/charts
    chart: web
    helm:
      postRenderer:
        exec:
          command: ["sh", "-c", "./hack/post-render.sh"]
      parameters:
        - name: extra
          value: "--post-renderer ./evil.sh"
