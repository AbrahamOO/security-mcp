apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  resource.compareoptions: |
    ignoreResourceStatusField: all
  application.resourceTrackingMethod: label
  exec.enabled: "true"
  accounts.ci-bot: apiKey, login
  kustomize.buildOptions: --load-restrictor LoadRestrictionsNone
  dex.config: |
    connectors:
      - type: github
        config:
          clientID: abc123
          clientSecret: s3cr3t-inline-value-do-not-commit
