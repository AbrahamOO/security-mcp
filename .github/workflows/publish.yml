name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # environment: npm-publish gates the NPM_TOKEN release behind a required-reviewer
    # approval. Create this environment in GitHub → Settings → Environments with at
    # least one required reviewer before enabling it. Until then this serves as the
    # intent declaration; the concurrency guard above prevents duplicate publish runs.
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # actions/checkout@v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Run security gate (self-check — folder_by_folder on src/ skills/ defaults/)
        # FIX for TM-005: HEAD..HEAD always produces an empty diff → zero findings → gate
        # trivially passes on every publish. Use folder_by_folder mode so the gate scans
        # the actual source tree regardless of what changed since the last commit.
        env:
          SECURITY_GATE_MODE: "folder_by_folder"
          SECURITY_GATE_TARGETS: "src,skills,defaults"
          SECURITY_GATE_POLICY: "defaults/security-policy.json"
          SECURITY_GATE_EVIDENCE_MAP: "defaults/evidence-map.json"
          SECURITY_GATE_CONTROL_CATALOG: "defaults/control-catalog.json"
          # Do NOT set SECURITY_GATE_EXCEPTIONS to the CI file: passing it via the env
          # override marks it isOverride, and unsigned override files are barred from
          # suppressing HIGH/CRITICAL. Leaving it unset lets the gate auto-load
          # .github/security-exceptions-ci.json as the isCiFile, which IS allowed to
          # suppress the self-scan false positives. (Verified: with the override the
          # self-check FAILs on 554 self-scan CRIT/HIGH; without it, PASS.)
          SECURITY_GATE_SCANNERS: ".github/security-tools-ci.json"
        run: node dist/ci/pr-gate.js

      - name: Verify npm token
        # NPM_TOKEN must be an npm Automation token (not a Classic/Legacy token).
        # Automation tokens bypass 2FA (EOTP) requirements in CI/CD pipelines.
        # Create one at: https://www.npmjs.com/settings/<username>/tokens
        # → Generate New Token → Automation
        # Then store it as the NPM_TOKEN secret in:
        #   GitHub → Settings → Environments → npm-publish → Environment secrets
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not set. Add an npm Automation token as NPM_TOKEN in the npm-publish environment secrets."
            exit 1
          fi
          npm whoami

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
