name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Run security gate (self-check)
        env:
          SECURITY_GATE_POLICY: "defaults/security-policy.json"
          SECURITY_GATE_EVIDENCE_MAP: "defaults/evidence-map.json"
          SECURITY_GATE_CONTROL_CATALOG: "defaults/control-catalog.json"
          SECURITY_GATE_EXCEPTIONS: "defaults/security-exceptions.json"
          SECURITY_GATE_SCANNERS: ".github/security-tools-ci.json"
        run: node dist/ci/pr-gate.js

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
