name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    # TODO: add `environment: npm-publish` once the environment is created in
    # GitHub → Settings → Environments with required-reviewers protection.
    # Without it, any maintainer who can push a v* tag can trigger npm publish
    # unilaterally. The environment acts as a second approval gate.
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Run security gate (self-check — folder_by_folder on src/ skills/ defaults/)
        # FIX for TM-005: HEAD..HEAD always produces an empty diff → zero findings → gate
        # trivially passes on every publish. Use folder_by_folder mode so the gate scans
        # the actual source tree regardless of what changed since the last commit.
        env:
          SECURITY_GATE_MODE: "folder_by_folder"
          SECURITY_GATE_TARGETS: "src,skills,defaults"
          SECURITY_GATE_POLICY: "defaults/security-policy.json"
          SECURITY_GATE_EVIDENCE_MAP: "defaults/evidence-map.json"
          SECURITY_GATE_CONTROL_CATALOG: "defaults/control-catalog.json"
          SECURITY_GATE_EXCEPTIONS: ".github/security-exceptions-ci.json"
          SECURITY_GATE_SCANNERS: ".github/security-tools-ci.json"
        run: node dist/ci/pr-gate.js

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
