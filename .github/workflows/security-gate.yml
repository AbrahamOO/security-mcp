name: Security Gate

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  security-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # 1) Secret scanning
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: "--redact --verbose"

      # 2) Dependency scanning (filesystem)
      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: "fs"
          ignore-unfixed: true
          format: "table"
          severity: "CRITICAL,HIGH"

      # 3) SAST (Semgrep)
      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/owasp-top-ten"

      # 4) IaC scan (if you have Terraform/K8s)
      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,kubernetes,cloudformation
        continue-on-error: true

      # 5) Your deterministic policy gate (fails PR if HIGH/CRITICAL findings)
      - name: Run policy gate
        env:
          SECURITY_GATE_BASE_REF: "origin/main"
          SECURITY_GATE_HEAD_REF: "HEAD"
          SECURITY_GATE_POLICY: "defaults/security-policy.json"
          SECURITY_GATE_EVIDENCE_MAP: "defaults/evidence-map.json"
          SECURITY_GATE_CONTROL_CATALOG: "defaults/control-catalog.json"
          SECURITY_GATE_EXCEPTIONS: "defaults/security-exceptions.json"
          SECURITY_GATE_SCANNERS: ".github/security-tools-ci.json"
        run: npm run ci:pr-gate
