name: Security Gate

on:
  pull_request:
    branches: ["main"]

# Explicit least-privilege permissions.
# security-events:write enables SARIF upload to GitHub Security tab for Trivy/Semgrep results.
# No write to contents, pull-requests, or packages — prevents NPM_TOKEN exposure from fork PRs.
permissions:
  contents: read
  security-events: write

jobs:
  security-gate:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # 1) Secret scanning
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # gitleaks/gitleaks-action@v2
        with:
          args: "--redact --verbose"

      # 2) Dependency scanning (filesystem) — results uploaded as SARIF to GitHub Security tab
      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          ignore-unfixed: true
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57  # codeql-action@v3.36.0
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      # 3) SAST (Semgrep) — Note: org renamed from returntocorp to semgrep
      - name: Semgrep
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d  # semgrep/semgrep-action latest
        with:
          config: "p/owasp-top-ten"

      # 4) IaC scan — only runs (and gates) when real IaC files are present.
      #    '**/*.yaml' was intentionally dropped from the condition: it matched
      #    .checkov.yaml and workflow files, making the guard always-true. The
      #    fixture Terraform under fixtures/ is excluded via .checkov.yaml skip-path,
      #    so this condition correctly fires only when real IaC is added to the repo.
      - name: Checkov
        if: hashFiles('**/*.tf', 'k8s/**') != ''
        uses: bridgecrewio/checkov-action@fa9edf8f0a491c59a924ea6accd5bdcf07752cff  # bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,kubernetes,cloudformation
        continue-on-error: false

      # 5) Your deterministic policy gate (fails PR if HIGH/CRITICAL findings)
      - name: Run policy gate
        env:
          SECURITY_GATE_BASE_REF: "origin/main"
          SECURITY_GATE_HEAD_REF: "HEAD"
          SECURITY_GATE_POLICY: "defaults/security-policy.json"
          SECURITY_GATE_EVIDENCE_MAP: "defaults/evidence-map.json"
          SECURITY_GATE_CONTROL_CATALOG: "defaults/control-catalog.json"
          SECURITY_GATE_EXCEPTIONS: "defaults/security-exceptions.json"
          SECURITY_GATE_SCANNERS: ".github/security-tools-ci.json"
        run: npm run ci:pr-gate
